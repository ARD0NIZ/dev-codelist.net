---
---
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>dev-codelist.net | Code Editor</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="dev-codelist.net | Code Editor">
    <meta property="og:description" content="A browser-based multi-file code editor. Edit, preview, and download – no data saved.">
    <meta property="og:image" content="/assets/media/Logo.png">
    <meta property="og:site_name" content="dev-codelist.net">
    <meta name="theme-color" content="#5024F4">

    <link rel="icon" type="image/png" href="/assets/media/Logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/editor.css">
    <script src="/assets/js/live-dev.js"></script>

    <!-- JSZip (ZIP extraction on upload) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Monaco Editor (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
</head>
<body class="selection:bg-[#5024F4]/30" style="overflow:hidden;">

    {% include header.html %}

    <!-- Leave Editor Button (fixed, always on top of nav) -->
    <div style="position:fixed;top:0;right:0;z-index:200;height:80px;display:flex;align-items:center;padding:0 24px;gap:4px;">
        <!-- Explorer action icons -->
        <button class="sidebar-icon-btn" title="New File" onclick="EditorApp.newFile()" style="width:32px;height:32px;">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        </button>
        <button class="sidebar-icon-btn" title="New Folder" onclick="EditorApp.newFolder()" style="width:32px;height:32px;">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        </button>
        <button class="sidebar-icon-btn" title="Upload Files" onclick="EditorApp.triggerUploadFiles()" style="width:32px;height:32px;">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <button class="sidebar-icon-btn" title="Upload Folder" onclick="EditorApp.triggerUploadFolder()" style="width:32px;height:32px;">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/></svg>
        </button>
        <button class="sidebar-icon-btn" title="Reset to defaults" onclick="EditorApp.resetAll()" style="width:32px;height:32px;">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.59"/></svg>
        </button>
        <div style="width:1px;height:20px;background:rgba(255,255,255,0.1);margin:0 8px;"></div>
        <!-- Leave Editor -->
        <a href="/" id="leave-editor-btn"
           style="display:flex;align-items:center;gap:8px;color:#9D7FFF;font-size:0.8rem;font-weight:600;text-decoration:none;font-family:'Plus Jakarta Sans',sans-serif;transition:color 0.15s;"
           onmouseenter="this.querySelector('span').style.background='rgba(80,36,244,0.28)';this.querySelector('span').style.borderColor='rgba(123,79,255,0.55)';this.querySelector('span').style.color='#fff';"
           onmouseleave="this.querySelector('span').style.background='rgba(80,36,244,0.12)';this.querySelector('span').style.borderColor='rgba(80,36,244,0.3)';this.querySelector('span').style.color='#9D7FFF';">
            <span style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;background:rgba(80,36,244,0.12);border:1px solid rgba(80,36,244,0.3);transition:background 0.15s,border-color 0.15s,color 0.15s;">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
                Leave editor
            </span>
        </a>
    </div>

    <!-- Hidden upload inputs -->
    <input type="file" id="upload-files-input" multiple style="display:none;">
    <input type="file" id="upload-folder-input" webkitdirectory multiple style="display:none;">

    <!-- Editor Shell -->
    <div id="editor-shell" class="editor-shell">

        <!-- Sidebar -->
        <aside id="editor-sidebar" class="editor-sidebar">

            <!-- Sidebar Header -->
            <div class="sidebar-header">
                <span class="sidebar-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M3 3h6l2 4H3V3zM3 11h18v10H3z"/></svg>
                    EXPLORER
                </span>
            </div>

            <!-- File Tree -->
            <div id="file-tree" class="file-tree"></div>

            <!-- Sidebar Footer: Download -->
            <div class="sidebar-footer">
                <button class="sidebar-download-btn" id="sidebar-dl-btn" onclick="EditorApp.downloadAll(this)">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    <span id="sidebar-dl-label">Download all (.zip)</span>
                </button>
            </div>
        </aside>

        <!-- Drag Handle -->
        <div id="sidebar-resize" class="sidebar-resize" title="Drag to resize"></div>

        <!-- Main Editor Area -->
        <div class="editor-main">

            <!-- Tab Bar -->
            <div class="editor-tabbar" id="editor-tabbar">
                <div id="tab-list" class="tab-list"></div>
                <div class="tabbar-actions">
                    <button class="tabbar-icon-btn" title="Split view (toggle)" onclick="EditorApp.toggleSplit()">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
                    </button>
                    <button class="tabbar-icon-btn" title="Download active file" onclick="EditorApp.downloadActive()">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </button>
                    <button class="tabbar-icon-btn" title="Format document (Alt+Shift+F)" onclick="EditorApp.formatDoc()">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
                    </button>
                    <button class="tabbar-icon-btn" title="Toggle word wrap" onclick="EditorApp.toggleWrap()">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                    </button>
                </div>
            </div>

            <!-- Monaco Container (split-able) -->
            <div id="editor-split-container" class="editor-split-container">
                <div id="monaco-container-left" class="monaco-pane"></div>
                <div id="split-divider" class="split-divider hidden"></div>
                <div id="monaco-container-right" class="monaco-pane hidden"></div>
            </div>

            <!-- Status Bar -->
            <div class="editor-statusbar">
                <div class="status-left">
                    <span id="status-lang" class="status-item">Plain Text</span>
                    <span class="status-sep">|</span>
                    <span id="status-encoding" class="status-item">UTF-8</span>
                </div>
                <div class="status-right">
                    <span id="status-pos" class="status-item">Ln 1, Col 1</span>
                    <span class="status-sep">|</span>
                    <span id="status-lines" class="status-item">0 lines</span>
                    <span class="status-sep">|</span>
                    <span class="status-item status-notice">
                        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        Not saved — resets on reload
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="ctx-menu" class="ctx-menu hidden">
        <!-- Folder-only actions (shown/hidden via JS) -->
        <button class="ctx-item" id="ctx-new-file-here" style="display:none;">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
            New File here
        </button>
        <button class="ctx-item" id="ctx-new-folder-here" style="display:none;">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
            New Folder here
        </button>
        <div class="ctx-sep" id="ctx-sep-folder" style="display:none;"></div>
        <button class="ctx-item" id="ctx-download-folder" style="display:none;">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download Folder (.zip)
        </button>
        <button class="ctx-item" id="ctx-rename">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Rename
        </button>
        <button class="ctx-item" id="ctx-duplicate">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Duplicate
        </button>
        <button class="ctx-item" id="ctx-download">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
        </button>
        <div class="ctx-sep"></div>
        <button class="ctx-item ctx-danger" id="ctx-delete">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            Delete
        </button>
    </div>

    <!-- Inline Rename Input (absolute positioned over tree) -->
    <input id="inline-rename" class="inline-rename hidden" type="text" spellcheck="false" />

    <!-- New File/Folder Modal -->
    <div id="new-item-modal" class="modal-backdrop hidden" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <p id="modal-title" class="modal-title">New File</p>
                <button class="modal-btn-x" onclick="EditorApp.closeModal()" title="Close (Esc)">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <input id="modal-input" class="modal-input" type="text" placeholder="filename.js" spellcheck="false" />
            <div class="modal-actions">
                <button class="modal-btn-cancel" onclick="EditorApp.closeModal()">Cancel</button>
                <button class="modal-btn-ok" id="modal-ok-btn" onclick="EditorApp.confirmModal()">Create</button>
            </div>
        </div>
    </div>

    <!-- Drag & Drop overlay -->
    <div id="drag-overlay" style="display:none;position:fixed;inset:0;z-index:400;background:rgba(80,36,244,0.1);border:3px dashed rgba(123,79,255,0.55);pointer-events:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;">
        <svg width="52" height="52" fill="none" stroke="#7B4FFF" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span style="color:#9D7FFF;font-size:1rem;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;">Drop files or folders here</span>
        <span style="color:#5a6274;font-size:0.75rem;font-family:'Plus Jakarta Sans',sans-serif;">.zip files will be extracted automatically</span>
    </div>

    {% include footer.html %}

    <script src="/assets/js/editor.js"></script>
</body>
</html>
