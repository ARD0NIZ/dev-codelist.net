    <div class="max-w-7xl mx-auto px-6">
        <div class="flex flex-col items-center gap-4 mb-6">
            <img src="/assets/media/ShineLogoBlackBG.gif" alt="dev-codelist.net Logo" class="footer-logo w-12 h-12 rounded-lg object-cover">

        </div>
        <div class="flex items-center justify-center gap-6 mb-5 text-sm font-medium">
            <a href="/" class="text-gray-400 hover:text-white transition-colors">Home</a>

<!-- Scroll to Top -->
<button id="scroll-top" aria-label="Scroll to top"
    style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:50;width:2.75rem;height:2.75rem;border-radius:9999px;background:linear-gradient(135deg,#5024F4,#7B4FFF);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(80,36,244,0.4);opacity:0;pointer-events:none;transition:opacity 0.3s,transform 0.2s;border:none;cursor:pointer;">
    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
</button>

<script>
    (function () {
        var yearEl = document.getElementById('footer-year');
        if (yearEl) yearEl.textContent = new Date().getFullYear();

        var btn = document.getElementById('scroll-top');
        if (!btn) return;
        window.addEventListener('scroll', function () {
            var show = window.scrollY > 300;
            btn.style.opacity = show ? '1' : '0';
            btn.style.pointerEvents = show ? 'auto' : 'none';
        }, { passive: true });
        btn.addEventListener('click', function () {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        btn.addEventListener('mouseenter', function () { btn.style.transform = 'scale(1.1)'; });
        btn.addEventListener('mouseleave', function () { btn.style.transform = 'scale(1)'; });
    })();
</script>
